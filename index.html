<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="color-scheme" content="dark">

    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="preload" href="/fonts/Signifier-Light.woff2" as="font" type="font/woff2" crossorigin>

    <title>Markup — Every draft reviewed by four experts</title>

    <meta name="author" content="n3wth" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://markup.so" />
    <meta property="og:title" content="Markup — Every draft reviewed by four experts" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Markup — Every draft reviewed by four experts. AI agents that read your docs and push back on what you missed." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Markup — Every draft reviewed by four experts" />
    <meta name="twitter:description" content="AI agents that read your docs and push back on what you missed." />
    <meta name="twitter:image" content="https://markup.so/og-image.png" />
    <meta name="twitter:image:alt" content="Markup — Every draft reviewed by four experts" />
