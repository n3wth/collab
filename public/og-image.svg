      <stop offset="0%" stop-color="#30d158"/>
      <stop offset="100%" stop-color="#64d2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#30d158" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#64d2ff" stop-opacity="0.04"/>
